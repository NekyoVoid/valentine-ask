<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Valentine Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      
      <p>  ♡ ! Mail Delivery ! ♡ </p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Will you be my Valentine?</h1>

        <img src="shadow_hedgehog.gif" class="cat" id="letter-cat" alt="shadow_hedgehog" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.png" class="btn no-btn" alt="No" />
          </div>
        </div>
        

        <p id="final-text" class="final-text" style="display: none">
          <strong>DATE TIME</strong> we play games & brainrot but first ! ! 
          want to access memory folder?
        </p> 
        
      </div>
    </div>



      <!-- Collage Screen -->
      <div id="collage-container">
      <!-- <div class="collage" > -->
        <img src="collage.png" alt="Photo collage" id="collage" />
        <p id="memories-title">˚ʚ♡ɞ˚ Memories ˚ʚ♡ɞ˚</p>
      <!--</div> -->
      </div>
  

      <script src="script.js"></script>
  </body>
</html>
